syntax="proto3";

//splits our request and response into different files
option java_multiple_files=true;

//ensures that the code generation puts all of our code into a package named billing
//so from outside we can reference this service using this package
option java_package="billing";

service BillingService{
  rpc CreateBillingAccount (BillingRequest) returns (BillingResponse);
}

//kind of like a dto to describe how our request will look like and what it will include
message BillingRequest{
  //the nos are like unique identifiers for grpc to identify and help in serialization and deserialization
  string patientId = 1;
  string patientName = 2;
  string patientEmail = 3;
}

message BillingResponse{
  string accountId = 1;
  string status = 2;
}